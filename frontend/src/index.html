<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spoiler Room</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <!----------------------
    NAVBAR
    ----------------------->
    <nav id="navbar" class="hidden">
        <span class="logo">Spoiler Room</span>
        <ul class="nav-links">
            <li><a href="#home-view">Home</a></li>
            <li><a href="#shows-list">Shows</a></li>
            <li><a href="#add-show-section">Add Show</a></li>
        </ul>
        <span id="nav-user"></span>
        <button id="logout-btn">Logout</button>
    </nav>

    <!----------------------
    VIEW: LOGIN
    ----------------------->

    <section id="login-view">
        <div class="login-header">
            <span class="logo">Spoiler Room</span>
        </div>

        <div class="login-card">
            <h1>Log in</h1>

            <form id="login-form">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button id="login-btn" type="submit">Log in</button>
            </form>

            <p id="login-error" class="error hidden"></p>
        </div>
    </section>

    <!----------------------
    VIEW: HOME
    ----------------------->

    <section id="home-view" class="hidden">

        <div id="hero">
            <div class="hero-content">
                <h1>Welcome back!</h1>
                <p>Discover, review and share your favorite shows.</p>
                <button id="explore-btn" type="button">Explore Shows</button>
            </div>
        </div>

        <div class="section-header">
            <h2>Popular Shows</h2>
        </div>

        <p id="loading-message" class="hidden">Loading shows...</p>
        <div id="shows-list"></div>
        <p id="shows-error" class="error hidden"></p>

        <div id="add-show-section" class="hidden">
            <h3>Add New Show</h3>
            <form id="add-show-form">
                <input type="text" id="show-title" placeholder="Show Title" required>
                <textarea id="show-description" placeholder="Show Description"></textarea>
                <button id="add-show-btn" type="submit">Add Show</button>
            </form>
        </div>

    </section>

    <!----------------------
    VIEW: SHOW DETAILS
    ----------------------->
    <section id="view-detail" class="hidden">
      <button id="back-btn">← Back</button>

      <h2 id="detail-title"></h2>
      <p id="detail-review-count"></p>

      <div id="review-list"></div>

      <div id="add-review-section" class="hidden">
        <h3>Write a Review</h3>
        <input type="number" id="review-rating" placeholder="Rating (1-5)" min="1" max="5" required>
        <textarea id="review-body" placeholder="Write your review..."></textarea>
        <button id="add-review-btn" type="button">Publish Review</button>
      </div>

    </section>

    <!----------------------
    SCRIPTS
    ----------------------->
    <script type="module" src="app.js"></script>

</body>
</html>
